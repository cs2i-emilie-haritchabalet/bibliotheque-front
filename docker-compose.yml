services:
  # Frontend Angular
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bibliotheque-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:${BACKEND_PORT:-8080}
    networks:
      - bibliotheque-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4200/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Backend Spring Boot
  backend:
    build:
      context: ${BACKEND_PATH:-./../bibliotheque-back-java}
      dockerfile: Dockerfile
    container_name: bibliotheque-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - postgres
      - mailpit
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:${POSTGRES_PORT:-5432}/bibliotheque
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPRING_MAIL_HOST=mailpit
      - SPRING_MAIL_PORT=1025
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
    networks:
      - bibliotheque-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bibliotheque-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bibliotheque}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bibliotheque-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit (Mail Server)
  mailpit:
    image: axllent/mailpit:latest
    container_name: bibliotheque-mailpit
    ports:
      - "1025:1025"
      - "${MAILPIT_PORT:-8025}:8025"
    networks:
      - bibliotheque-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  bibliotheque-network:
    driver: bridge
