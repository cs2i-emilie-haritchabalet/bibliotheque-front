variables:
  NODE_VERSION: "20"
  TRIVY_VERSION: "0.69.3"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

stages:
  - build
  - test
  - security
  - image
  - deploy

# ─────────────────────────────────────────────
# BUILD + UNIT TESTS
# ─────────────────────────────────────────────

build-test:
  stage: build
  image: node:${NODE_VERSION}-alpine

  cache:
    paths:
      - node_modules/
      - .npm/
    policy: pull-push

  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build

  artifacts:
    paths:
      - dist/
    expire_in: 1 day

unit-tests:
  stage: test
  image: node:${NODE_VERSION}-alpine
  needs:
    - build-test

  cache:
    paths:
      - node_modules/
      - .npm/
    policy: pull

  before_script:
    - apk add --no-cache chromium
    - export CHROME_BIN=/usr/bin/chromium-browser
    - export CHROMIUM_FLAGS="--no-sandbox --disable-gpu --disable-dev-shm-usage"

  script:
    - npm ci --cache .npm --prefer-offline
    - npm test

  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
      junit: coverage/junit.xml
    expire_in: 30 days

# ─────────────────────────────────────────────
# E2E TESTS
# ─────────────────────────────────────────────

e2e-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.50.0-noble
  needs:
    - build-test

  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_DB: bibliotheque
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres

    - name: axllent/mailpit:latest
      alias: mailpit

  cache:
    paths:
      - node_modules/
      - .npm/
    policy: pull

  before_script:
    - npm ci --cache .npm --prefer-offline

  script:
    - npm run build
    - npm run e2e

  artifacts:
    when: always
    paths:
      - test-results/
      - playwright-report/
    reports:
      junit: test-results/junit.xml
    expire_in: 30 days

# ─────────────────────────────────────────────
# SECURITY: SAST + Dependencies
# ─────────────────────────────────────────────

npm-audit:
  stage: security
  image: node:${NODE_VERSION}-alpine
  needs:
    - build-test

  cache:
    paths:
      - node_modules/
      - .npm/
    policy: pull

  script:
    - npm ci --cache .npm --prefer-offline
    - npm audit --audit-level=critical

  allow_failure: true

semgrep-sast:
  stage: security
  image: semgrep/semgrep:latest
  needs:
    - build-test

  script:
    - semgrep ci --config=auto --json --output=semgrep-report.json

  allow_failure: true

  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 30 days

# ─────────────────────────────────────────────
# BUILD DOCKER IMAGE
# ─────────────────────────────────────────────

docker-build:
  needs:
    - unit-tests
    - e2e-tests
  stage: image
  image: docker:latest
  services:
    - docker:dind

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest

  after_script:
    - docker logout

  only:
    - main
    - develop

# ─────────────────────────────────────────────
# CONTAINER SECURITY (TRIVY)
# ─────────────────────────────────────────────

trivy-scan:
  stage: image
  image: docker:latest
  services:
    - docker:dind

  needs:
    - docker-build

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

  script:
    - |
      docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        -e TRIVY_USERNAME=$CI_REGISTRY_USER \
        -e TRIVY_PASSWORD=$CI_REGISTRY_PASSWORD \
        aquasec/trivy:${TRIVY_VERSION} \
        image --no-progress \
        --severity HIGH,CRITICAL \
        --exit-code 1 \
        $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

  after_script:
    - docker logout

  allow_failure: true

  only:
    - main
    - develop

# ─────────────────────────────────────────────
# DEPLOYMENT (Optional)
# ─────────────────────────────────────────────

deploy-staging:
  stage: deploy
  image: alpine:latest
  needs:
    - docker-build

  before_script:
    - apk add --no-cache curl

  script:
    - echo "Deploying to staging environment"

  environment:
    name: staging
    url: https://staging.bibliotheque.example.com

  only:
    - develop

deploy-production:
  stage: deploy
  image: alpine:latest
  needs:
    - trivy-scan

  before_script:
    - apk add --no-cache curl

  script:
    - echo "Deploying to production environment"

  environment:
    name: production
    url: https://bibliotheque.example.com

  when: manual
  only:
    - main