services:
  # Backend Spring Boot (development)
  backend:
    build:
      context: ${BACKEND_PATH:-./../bibliotheque-back-java}
      dockerfile: Dockerfile
    container_name: bibliotheque-backend-dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:${POSTGRES_PORT:-5432}/bibliotheque
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPRING_MAIL_HOST=mailpit
      - SPRING_MAIL_PORT=1025
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - postgres
      - mailpit
    networks:
      - bibliotheque-network
    volumes:
      - ${BACKEND_PATH:-./../bibliotheque-back-java}:/app  # Hot reload
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bibliotheque-postgres-dev
    environment:
      POSTGRES_DB: bibliotheque
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bibliotheque-network
    restart: unless-stopped

  # Mailpit (Mail Server)
  mailpit:
    image: axllent/mailpit:latest
    container_name: bibliotheque-mailpit-dev
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - bibliotheque-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  bibliotheque-network:
    driver: bridge
